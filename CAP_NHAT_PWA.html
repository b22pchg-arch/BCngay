<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cập nhật SCADA PWA 1.1.0</title><style>body{font-family:Arial,sans-serif;background:#f4f7fb;color:#0f172a;padding:30px}.card{max-width:720px;margin:auto;background:#fff;border:1px solid #cbd5e1;border-radius:14px;padding:22px;box-shadow:0 12px 35px #0f172a1f}pre{white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:10px}button{border:0;border-radius:9px;padding:10px 14px;background:#0f766e;color:#fff;font-weight:700}</style></head><body><div class="card"><h1>Làm mới SCADA Report PWA</h1><p id="status">Đang xóa service worker và cache cũ...</p><pre id="detail"></pre><button id="retry" hidden>Thử lại</button></div><script>(async()=>{const status=document.getElementById('status'),detail=document.getElementById('detail'),retry=document.getElementById('retry');async function run(){retry.hidden=true;try{const regs=('serviceWorker'in navigator)?await navigator.serviceWorker.getRegistrations():[];await Promise.all(regs.map(r=>r.unregister()));const names=('caches'in window)?await caches.keys():[];const old=names.filter(n=>n.startsWith('scada-report-'));await Promise.all(old.map(n=>caches.delete(n)));detail.textContent='Đã xóa '+regs.length+' service worker và '+old.length+' cache.\nĐang mở V152-PWA-1.2.0...';status.textContent='Hoàn tất.';setTimeout(()=>location.replace('./index.html?v=1.2.0&t='+Date.now()),900)}catch(e){status.textContent='Không làm mới được.';detail.textContent=e&&e.stack?e.stack:String(e);retry.hidden=false}}retry.addEventListener('click',run);run()})();</script></body></html>
